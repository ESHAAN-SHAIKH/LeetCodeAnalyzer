<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="LeetCodeAnalyzer">
  <title>LeetCodeAnalyzer</title>
  <!-- Brand mark: dark ink rounded square + ascending gold L-bars -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0B0E0C"/>
  <!-- Subtle inner highlight (very faint, scales away at small sizes) -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#1D231A" stroke-width="1"/>
  <!-- Ascending bars: 3 bars forming a Big-O / progress chart that reads
       as a stylized L when combined with the baseline below. -->
  <g>
    <rect x="16" y="38" width="7" height="9" rx="1.5" fill="#D9A441"/>
    <rect x="28.5" y="28" width="7" height="19" rx="1.5" fill="#D9A441"/>
    <rect x="41" y="16" width="7" height="31" rx="1.5" fill="#D9A441"/>
  </g>
  <!-- Horizontal baseline tying the bars into an L shape -->
  <rect x="14" y="48" width="36" height="3" rx="1.5" fill="#E8C27A"/>
</svg>
